<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="PDV para pequenos negócios brasileiros. Frente de caixa, estoque, ordens de serviço e financeiro preditivo — tudo em um só app, com IA para cadastrar produtos e prever caixa.">
  <meta name="theme-color" content="#0F2D3A">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Six POS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Six POS — Gestão simples, resultados reais.</title>
  <link rel="manifest" href="manifest.json">

  <!-- Pré-carrega Inter para combinar com o design system Six POS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Splash inline enquanto o Flutter inicializa — espelha o token ink (#0F2D3A)
       e mostra o logo centralizado. Removido automaticamente quando o app monta. -->
  <style>
    html, body { margin: 0; padding: 0; background: #FFFFFF; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif; }
    #boot-splash {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #FFFFFF;
      z-index: 9999;
      transition: opacity 240ms ease-out;
    }
    #boot-splash img { width: 160px; height: auto; }
    #boot-splash.hidden { opacity: 0; pointer-events: none; }
  </style>

  <!-- Google Sign-In (mesmo client ID usado como serverClientId nas plataformas nativas) -->
  <meta name="google-signin-client_id" content="194419403668-manc56voom9d29bv0n7m4pilub8j864a.apps.googleusercontent.com">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="boot-splash">
    <img src="icons/Icon-512.png" alt="Six POS">
  </div>
  <script>
    // Esconde o splash quando o Flutter dispatcha o primeiro frame.
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('boot-splash');
      if (!s) return;
      s.classList.add('hidden');
      setTimeout(function () { s && s.remove(); }, 280);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
