name: sixpos
description: "Six Point of Sale"
publish_to: 'none'
version: 1.36.0+37
environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  image_picker: ^1.1.2
  image_picker_for_web: ^3.0.6
  http: ^0.13.3
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  smooth_page_indicator: ^1.1.0
  fl_chart: ^0.63.0
  stomp_dart_client: ^0.4.4
  flutter_local_notifications: ^17.0.0
  signature: ^5.3.0
  flutter_animate: ^4.2.0
  http_interceptor: ^1.0.2
  google_sign_in: ^6.2.1
  google_sign_in_web: ^0.12.4
  share_plus: ^10.1.4
  mobile_scanner: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/placeholder.png
    - assets/images/moca-tela-login.png
    - assets/images/six-logo-flecha.png
    - assets/images/web/
    - assets/images/stores/
    - assets/images/onboading/
    - assets/images/unsplash-1.jpg
