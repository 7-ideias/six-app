name: appplanilha
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  image_picker_for_web: ^3.0.6
  http: ^0.13.3
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  smooth_page_indicator: ^1.1.0
  fl_chart: ^0.63.0
  stomp_dart_client: ^0.4.4
  flutter_local_notifications: ^17.0.0
  signature: ^5.3.0
  flutter_animate: ^4.2.0
  http_interceptor: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/placeholder.png
    - assets/images/moca-tela-login.png
    - assets/images/web/
    - assets/images/stores/
