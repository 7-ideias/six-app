name: Aplicar remoção dos widgets obsoletos do PDVWeb

on:
  push:
    branches:
      - feature/20260711-layout
    paths:
      - .github/workflows/apply-remove-pdvweb-widgets.yml

permissions:
  contents: write

jobs:
  apply-change:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/20260711-layout

      - name: Remover widgets obsoletos
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path('lib/pdv_page_web.dart')
          content = path.read_text(encoding='utf-8')

          content = content.replace("import 'package:sixpos/l10n/app_localizations.dart';\n", '')
          content = content.replace(
              '  final ScrollController _seletorScrollController = ScrollController();\n',
              '',
          )
          content = content.replace('    _seletorScrollController.dispose();\n', '')
          content = content.replace(
              '      case ModuloCentralPDV.seletor:\n        return _buildSeletorModoOperacao();',
              '      case ModuloCentralPDV.seletor:\n        return const Expanded(child: SizedBox.shrink());',
          )

          pattern = re.compile(
              r'\n  Widget _buildModoOperacaoButton\(\{.*?\n  String labelAgendaFinanceira\(\) => \'Agenda Financeira\';\n',
              re.DOTALL,
          )
          content, replacements = pattern.subn('\n', content, count=1)
          if replacements != 1:
              raise RuntimeError('Bloco de widgets obsoletos não localizado exatamente uma vez.')

          path.write_text(content, encoding='utf-8')

      - name: Remover workflow temporário
        run: rm .github/workflows/apply-remove-pdvweb-widgets.yml

      - name: Commitar alteração
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/pdv_page_web.dart .github/workflows/apply-remove-pdvweb-widgets.yml
          git commit -m "refactor(web): remover widgets obsoletos do PDVWeb"
          git push origin feature/20260711-layout
