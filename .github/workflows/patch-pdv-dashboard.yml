name: Patch PDVWeb dashboard

on:
  push:
    branches:
      - feature/20260711-layout

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/20260711-layout
          fetch-depth: 0

      - name: Aplicar saudação e métricas administrativas
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('lib/pdv_page_web.dart')
          text = path.read_text(encoding='utf-8')

          import_anchor = "import 'presentation/screens/login_page_web.dart';\n"
          admin_imports = (
              "import 'presentation/admin/admin_dashboard_metrics.dart';\n"
              "import 'presentation/admin/admin_portal_components.dart';\n"
              "import 'presentation/admin/admin_portal_texts.dart';\n"
          )
          if admin_imports not in text:
              text = text.replace(import_anchor, admin_imports + import_anchor)

          field_anchor = "  int _opcaoCockpitSelecionada = 0;\n"
          if "String? _nomeUsuarioDashboard;" not in text:
              text = text.replace(
                  field_anchor,
                  field_anchor + "  String? _nomeUsuarioDashboard;\n",
              )

          init_anchor = "    _atualizarCamposDerivados();\n"
          if "_carregarUsuarioDashboard();" not in text:
              text = text.replace(
                  init_anchor,
                  init_anchor + "    _carregarUsuarioDashboard();\n",
                  1,
              )

          method_anchor = "  void _onThemeChanged() {\n"
          methods = r'''  Future<void> _carregarUsuarioDashboard() async {
    final String? email = await AuthService().getUserEmail();
    if (!mounted) {
      return;
    }

    setState(() {
      _nomeUsuarioDashboard = _nomeExibicaoPorEmail(email);
    });
  }

  String? _nomeExibicaoPorEmail(String? email) {
    final String normalizado = email?.trim() ?? '';
    if (normalizado.isEmpty || !normalizado.contains('@')) {
      return null;
    }

    final String prefixo = normalizado
        .split('@')
        .first
        .replaceAll('.', ' ')
        .replaceAll('_', ' ')
        .trim();

    if (prefixo.isEmpty) {
      return null;
    }

    return prefixo
        .split(RegExp(r'\s+'))
        .where((String parte) => parte.isNotEmpty)
        .map((String parte) {
          if (parte.length == 1) {
            return parte.toUpperCase();
          }
          return '${parte[0].toUpperCase()}${parte.substring(1).toLowerCase()}';
        })
        .join(' ');
  }

'''
          if "Future<void> _carregarUsuarioDashboard() async" not in text:
              text = text.replace(method_anchor, methods + method_anchor, 1)

          start_marker = "  Widget _buildSeletorModoOperacao() {\n"
          end_marker = "\n  String labelAgendaFinanceira() => 'Agenda Financeira';\n"
          start = text.find(start_marker)
          end = text.find(end_marker, start)
          if start == -1 or end == -1:
              raise SystemExit('Não foi possível localizar _buildSeletorModoOperacao')

          replacement = r'''  Widget _buildSeletorModoOperacao() {
    final AdminPortalTexts texts = AdminPortalTexts.of(context);
    final AdminCompaniesMetrics metrics = AdminCompaniesMetrics.fromValues(
      total: 4,
      active: 4,
    );

    return Expanded(
      child: SingleChildScrollView(
        controller: _seletorScrollController,
        primary: false,
        padding: const EdgeInsets.all(4),
        child: AdminStaggeredColumn(
          children: <Widget>[
            AdminDashboardHeader(
              texts: texts,
              userName: _nomeUsuarioDashboard,
            ),
            AdminMetricsGrid(texts: texts, metrics: metrics),
          ],
        ),
      ),
    );
  }
'''
          text = text[:start] + replacement + text[end:]

          path.write_text(text, encoding='utf-8')
          PY

          dart format lib/pdv_page_web.dart || true
          rm -f .github/workflows/patch-pdv-dashboard.yml

      - name: Commit da alteração
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/pdv_page_web.dart .github/workflows/patch-pdv-dashboard.yml
          git commit -m "feat(web): reutilizar saudação e métricas do dashboard admin no PDVWeb"
          git push origin HEAD:feature/20260711-layout
